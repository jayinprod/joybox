<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JOYBOX</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --surface2: #1a1a1a;
      --border: #2a2a2a;
      --accent: #c8ff00;
      --accent2: #ff6b35;
      --text: #f0f0f0;
      --muted: #555;
      --radius: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── SETUP ── */
    #setup-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 32px 24px;
      gap: 24px;
    }

    #setup-screen h1 { font-size: 48px; font-weight: 800; letter-spacing: -2px; color: var(--accent); }
    #setup-screen p { color: var(--muted); font-family: 'Space Mono', monospace; font-size: 13px; text-align: center; max-width: 320px; }

    .setup-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .setup-card label { font-size: 11px; font-family: 'Space Mono', monospace; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }

    .setup-card input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 13px;
      padding: 14px 16px;
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
    }

    .setup-card input:focus { border-color: var(--accent); }

    .btn-primary {
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 15px;
      padding: 16px;
      cursor: pointer;
      width: 100%;
      transition: opacity 0.15s, transform 0.15s;
    }

    .btn-primary:active { opacity: 0.8; transform: scale(0.98); }

    /* ── LOADING ── */
    #loading {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 16px;
    }

    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-family: 'Space Mono', monospace; font-size: 13px; color: var(--muted); }

    /* ── MAIN APP ── */
    #app { display: none; flex-direction: column; min-height: 100vh; padding-bottom: 80px; }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 20px 0;
    }

    header h1 { font-size: 22px; font-weight: 800; color: var(--accent); letter-spacing: -1px; }

    .icon-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      cursor: pointer;
      padding: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s;
    }

    .icon-btn:hover { border-color: var(--accent); }
    .icon-btn:active { opacity: 0.7; }

    /* ── PLAYLIST TAB BAR ── */
    #playlist-bar {
      display: flex;
      gap: 8px;
      padding: 16px 20px 0;
      overflow-x: auto;
      scrollbar-width: none;
    }

    #playlist-bar::-webkit-scrollbar { display: none; }

    .pl-tab {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--muted);
      cursor: pointer;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      padding: 8px 14px;
      white-space: nowrap;
      transition: all 0.2s;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .pl-tab:hover { border-color: var(--accent); color: var(--text); }
    .pl-tab.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 700; }

    /* ── NOW PLAYING ── */
    #now-playing {
      margin: 16px 20px 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    #now-playing::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 160px; height: 160px;
      background: radial-gradient(circle, rgba(200,255,0,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .track-art {
      width: 100%;
      aspect-ratio: 1;
      background: var(--surface2);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
    }

    .track-art svg { opacity: 0.15; }

    #playlist-badge {
      position: absolute;
      top: 10px; left: 10px;
      background: rgba(0,0,0,0.7);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--accent);
      padding: 4px 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: none;
    }

    .visualizer {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 60px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 3px;
      padding: 0 20px 10px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .visualizer.active { opacity: 1; }
    .viz-bar { width: 4px; background: var(--accent); border-radius: 2px; min-height: 4px; transition: height 0.1s; }

    .track-info { margin-bottom: 14px; }

    #track-name { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    #track-sub { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); margin-top: 4px; }

    .progress-wrap { margin-bottom: 16px; }

    #progress-bar {
      width: 100%; height: 4px;
      background: var(--border);
      border-radius: 2px;
      cursor: pointer;
      margin-bottom: 8px;
    }

    #progress-fill { height: 100%; background: var(--accent); border-radius: 2px; width: 0%; transition: width 0.5s linear; pointer-events: none; }

    .time-row { display: flex; justify-content: space-between; font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); }

    .controls { display: flex; align-items: center; justify-content: space-between; gap: 8px; }

    .ctrl-btn {
      background: none; border: none; color: var(--muted);
      cursor: pointer; padding: 8px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      transition: color 0.2s;
    }

    .ctrl-btn:hover { color: var(--text); }
    .ctrl-btn.active { color: var(--accent); }

    #play-btn {
      background: var(--accent); color: #000; border: none;
      border-radius: 50%; width: 56px; height: 56px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: transform 0.15s, opacity 0.15s; flex-shrink: 0;
    }

    #play-btn:active { transform: scale(0.92); }

    .volume-row { display: flex; align-items: center; gap: 10px; margin-top: 14px; }
    .volume-row svg { color: var(--muted); flex-shrink: 0; }

    input[type=range] { flex: 1; -webkit-appearance: none; height: 4px; background: var(--border); border-radius: 2px; outline: none; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; background: var(--accent); border-radius: 50%; cursor: pointer; }

    /* ── SONG LIST ── */
    #song-list-section { flex: 1; margin: 16px 20px 0; }

    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .section-title { font-size: 11px; font-family: 'Space Mono', monospace; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
    #song-count { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); }

    #song-list { display: flex; flex-direction: column; gap: 6px; max-height: 280px; overflow-y: auto; padding-right: 4px; }
    #song-list::-webkit-scrollbar { width: 4px; }
    #song-list::-webkit-scrollbar-track { background: transparent; }
    #song-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .song-item {
      display: flex; align-items: center; gap: 14px;
      padding: 12px 14px;
      background: var(--surface);
      border: 1px solid transparent;
      border-radius: 12px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }

    .song-item:hover { border-color: var(--border); }
    .song-item.active { border-color: var(--accent); background: rgba(200,255,0,0.05); }

    .song-num { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); width: 20px; text-align: center; flex-shrink: 0; }
    .song-item.active .song-num { color: var(--accent); }

    .song-details { flex: 1; overflow: hidden; }
    .song-title { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .song-meta { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); margin-top: 2px; display: flex; gap: 8px; }
    .song-pl-tag { color: var(--accent); opacity: 0.8; }

    /* ── BOTTOM NAV ── */
    #bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(10,10,10,0.95);
      backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
      display: flex;
      padding: 10px 0 16px;
    }

    .nav-btn {
      flex: 1; background: none; border: none; color: var(--muted);
      cursor: pointer; display: flex; flex-direction: column;
      align-items: center; gap: 4px; padding: 6px;
      transition: color 0.2s;
      font-family: 'Space Mono', monospace; font-size: 9px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }

    .nav-btn.active { color: var(--accent); }
    .nav-btn:hover { color: var(--text); }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 80px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 20px;
      font-family: 'Space Mono', monospace; font-size: 12px; color: var(--text);
      transition: transform 0.3s; z-index: 100; white-space: nowrap;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.error { border-color: var(--accent2); color: var(--accent2); }

    .empty-state { text-align: center; padding: 32px 20px; font-family: 'Space Mono', monospace; font-size: 12px; color: var(--muted); line-height: 1.8; }
  </style>
</head>
<body>

<!-- LOADING -->
<div id="loading">
  <div class="spinner"></div>
  <div class="loading-text">Loading library...</div>
</div>

<!-- SETUP -->
<div id="setup-screen">
  <h1>JOYBOX</h1>
  <p>Enter your password to access your music library.</p>
  <div class="setup-card">
    <label>Password</label>
    <input type="password" id="app-password-input" placeholder="••••••••"
           onkeydown="if(event.key==='Enter') saveConfig()" />
    <button class="btn-primary" onclick="saveConfig()">Unlock</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <header>
    <h1>JOYBOX</h1>
    <button class="icon-btn" onclick="resetConfig()" title="Disconnect">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
    </button>
  </header>

  <!-- PLAYLIST TABS -->
  <div id="playlist-bar"></div>

  <!-- NOW PLAYING -->
  <div id="now-playing">
    <div class="track-art">
      <svg width="80" height="80" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
      <div id="playlist-badge"></div>
      <div class="visualizer" id="visualizer"></div>
    </div>
    <div class="track-info">
      <div id="track-name">Select a track</div>
      <div id="track-sub">— / —</div>
    </div>
    <div class="progress-wrap">
      <div id="progress-bar" onclick="seek(event)">
        <div id="progress-fill"></div>
      </div>
      <div class="time-row">
        <span id="time-current">0:00</span>
        <span id="time-total">0:00</span>
      </div>
    </div>
    <div class="controls">
      <button class="ctrl-btn" id="shuffle-btn" onclick="toggleShuffle()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/></svg>
      </button>
      <button class="ctrl-btn" onclick="playPrev()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>
      <button id="play-btn" onclick="togglePlay()">
        <svg id="play-icon" width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button class="ctrl-btn" onclick="playNext()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M16 6h2v12h-2zm-8.5 6 8.5 6V6l-8.5 6z" transform="scale(-1,1) translate(-24,0)"/></svg>
      </button>
      <button class="ctrl-btn" id="repeat-btn" onclick="toggleRepeat()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
      </button>
    </div>
    <div class="volume-row">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
      <input type="range" id="volume" min="0" max="1" step="0.01" value="1" oninput="setVolume(this.value)" />
    </div>
  </div>

  <!-- SONG LIST -->
  <div id="song-list-section">
    <div class="section-header">
      <span class="section-title" id="list-title">All Songs</span>
      <span id="song-count">—</span>
    </div>
    <div id="song-list">
      <div class="empty-state">Loading...</div>
    </div>
  </div>
</div>

<!-- BOTTOM NAV -->
<div id="bottom-nav" style="display:none">
  <button class="nav-btn active" id="nav-library" onclick="switchTab('library')">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 5h-3v5.5c0 1.38-1.12 2.5-2.5 2.5S10 13.88 10 12.5s1.12-2.5 2.5-2.5c.57 0 1.08.19 1.5.51V5h4v2zM4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6z"/></svg>
    Library
  </button>
  <button class="nav-btn" id="nav-playlists" onclick="switchTab('playlists')">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M15 6H3v2h12V6zm0 4H3v2h12v-2zM3 16h8v-2H3v2zM17 6v8.18c-.31-.11-.65-.18-1-.18-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3V8h3V6h-5z"/></svg>
    Playlists
  </button>
</div>

<div class="toast" id="toast"></div>

<script>
  const WORKER_URL = '__WORKER_URL__'
  const AUTH_TOKEN = '__AUTH_TOKEN__'
  const APP_PASSWORD = '__APP_PASSWORD__'

  let allSongs = []
  let filteredSongs = []
  let playlists = []
  let activePlaylist = null
  let currentIndex = -1
  let currentSongName = null  // track playing song by name, not just index
  let isPlaying = false
  let isShuffle = false
  let isRepeat = false
  let shuffleOrder = []
  let audio = new Audio()
  let blobCache = {}

  // ── Init ──────────────────────────────────────────────
  if (localStorage.getItem('joybox_unlocked') === '1') {
    showApp()
  } else {
    document.getElementById('setup-screen').style.display = 'flex'
    setTimeout(() => document.getElementById('app-password-input')?.focus(), 100)
  }

  function saveConfig() {
    const entered = document.getElementById('app-password-input').value
    if (!entered) return showToast('Enter your password', true)
    if (entered !== APP_PASSWORD) return showToast('Wrong password', true)
    localStorage.setItem('joybox_unlocked', '1')
    showApp()
  }

  function resetConfig() {
    if (!confirm('Lock and reset?')) return
    localStorage.removeItem('joybox_unlocked')
    location.reload()
  }

  function showApp() {
    document.getElementById('setup-screen').style.display = 'none'
    document.getElementById('loading').style.display = 'flex'
    loadLibrary()
  }

  // ── Load library ──────────────────────────────────────
  async function loadLibrary() {
    try {
      const res = await fetch(`${WORKER_URL}/init`, {
        headers: { 'X-Auth-Token': AUTH_TOKEN }
      })

      if (res.status === 401) { showToast('Invalid token', true); return showSetupScreen() }
      if (!res.ok) throw new Error()

      const data = await res.json()
      allSongs = data.songs
      playlists = data.playlists

      renderPlaylistTabs()
      filterAndRender(null)

      document.getElementById('loading').style.display = 'none'
      document.getElementById('app').style.display = 'flex'
      document.getElementById('bottom-nav').style.display = 'flex'
    } catch {
      document.getElementById('loading').style.display = 'none'
      document.getElementById('setup-screen').style.display = 'flex'
      showToast('Cannot connect to worker', true)
    }
  }

  function showSetupScreen() {
    document.getElementById('loading').style.display = 'none'
    document.getElementById('setup-screen').style.display = 'flex'
  }

  // ── Playlist tabs ─────────────────────────────────────
  function renderPlaylistTabs() {
    const bar = document.getElementById('playlist-bar')
    const tabs = [{ label: '♫ All', value: null }, ...playlists.map(p => ({ label: p, value: p }))]
    bar.innerHTML = tabs.map(t => `
      <div class="pl-tab ${t.value === activePlaylist ? 'active' : ''}"
           onclick="selectPlaylist(${t.value === null ? 'null' : `'${t.value}'`})">
        ${t.label}
      </div>`).join('')
  }

  function selectPlaylist(pl) {
    activePlaylist = pl
    renderPlaylistTabs()
    filterAndRender(pl)
  }

  function filterAndRender(pl) {
    filteredSongs = pl === null ? allSongs : allSongs.filter(s => s.playlist === pl)
    // re-resolve currentIndex based on currently playing song name
    currentIndex = currentSongName
      ? filteredSongs.findIndex(s => s.name === currentSongName)
      : -1
    buildShuffleOrder()
    renderList()
    document.getElementById('list-title').textContent = pl || 'All Songs'
  }

  // ── Song list ─────────────────────────────────────────
  function renderList() {
    const list = document.getElementById('song-list')
    document.getElementById('song-count').textContent = `${filteredSongs.length} tracks`

    if (!filteredSongs.length) {
      list.innerHTML = `<div class="empty-state">No songs found.<br>Upload MP3s to your R2 bucket${activePlaylist ? `<br>inside the <b>${activePlaylist}/</b> folder` : ''}.</div>`
      return
    }

    list.innerHTML = filteredSongs.map((s, i) => `
      <div class="song-item ${i === currentIndex ? 'active' : ''}" onclick="playSong(${i})">
        <div class="song-num">${i === currentIndex ? '▶' : i + 1}</div>
        <div class="song-details">
          <div class="song-title">${cleanName(s.displayName || s.name)}</div>
          <div class="song-meta">
            ${s.playlist && activePlaylist === null ? `<span class="song-pl-tag">${s.playlist}</span>` : ''}
            <span>${formatSize(s.size)}</span>
          </div>
        </div>
      </div>`).join('')
  }

  function cleanName(f) { return f.replace(/\.[^/.]+$/, '').replace(/[-_]/g, ' ') }
  function formatSize(b) { return b ? (b / 1048576).toFixed(1) + ' MB' : '' }

  // ── Play ──────────────────────────────────────────────
  async function playSong(index) {
    if (index < 0 || index >= filteredSongs.length) return
    currentIndex = index
    const song = filteredSongs[index]
    currentSongName = song.name

    document.getElementById('track-name').textContent = cleanName(song.displayName || song.name)
    document.getElementById('track-sub').textContent = song.name

    const badge = document.getElementById('playlist-badge')
    badge.textContent = song.playlist || ''
    badge.style.display = song.playlist ? 'block' : 'none'

    updateActiveItem()
    updateMediaSession(song)
    audio.pause(); audio.src = ''
    setPlayIcon(false); isPlaying = false

    showToast(`Loading ${cleanName(song.displayName || song.name)}…`)

    try {
      let blobUrl = blobCache[song.name]
      if (!blobUrl) {
        const res = await fetch(`${WORKER_URL}/file/${encodeURIComponent(song.name)}`, {
          headers: { 'X-Auth-Token': AUTH_TOKEN }
        })
        if (!res.ok) throw new Error()
        blobUrl = URL.createObjectURL(await res.blob())
        blobCache[song.name] = blobUrl
      }
      audio.src = blobUrl
      audio.play()
      isPlaying = true
      setPlayIcon(true)
      startVisualizer()
    } catch {
      showToast('Failed to load track', true)
    }
  }

  function updateActiveItem() {
    document.querySelectorAll('.song-item').forEach((el, i) => {
      el.classList.toggle('active', i === currentIndex)
      el.querySelector('.song-num').textContent = i === currentIndex ? '▶' : i + 1
    })
    document.querySelector('.song-item.active')?.scrollIntoView({ block: 'nearest', behavior: 'smooth' })
  }

  // ── Controls ──────────────────────────────────────────
  function togglePlay() {
    if (!audio.src) { if (filteredSongs.length) playSong(0); return }
    if (isPlaying) { audio.pause(); isPlaying = false; setPlayIcon(false); stopVisualizer() }
    else { audio.play(); isPlaying = true; setPlayIcon(true); startVisualizer() }
  }

  function setPlayIcon(p) {
    document.getElementById('play-icon').innerHTML = p
      ? '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>'
      : '<path d="M8 5v14l11-7z"/>'
  }

  function playNext() {
    if (!filteredSongs.length) return
    if (isShuffle) { const i = shuffleOrder.indexOf(currentIndex); playSong(shuffleOrder[(i + 1) % shuffleOrder.length]) }
    else playSong((currentIndex + 1) % filteredSongs.length)
  }

  function playPrev() {
    if (!filteredSongs.length) return
    if (audio.currentTime > 3) { audio.currentTime = 0; return }
    if (isShuffle) { const i = shuffleOrder.indexOf(currentIndex); playSong(shuffleOrder[(i - 1 + shuffleOrder.length) % shuffleOrder.length]) }
    else playSong((currentIndex - 1 + filteredSongs.length) % filteredSongs.length)
  }

  function toggleShuffle() {
    isShuffle = !isShuffle
    document.getElementById('shuffle-btn').classList.toggle('active', isShuffle)
    if (isShuffle) buildShuffleOrder()
  }

  function toggleRepeat() {
    isRepeat = !isRepeat
    audio.loop = isRepeat
    document.getElementById('repeat-btn').classList.toggle('active', isRepeat)
  }

  function setVolume(v) { audio.volume = v }

  function seek(e) {
    if (!audio.duration) return
    const r = document.getElementById('progress-bar').getBoundingClientRect()
    audio.currentTime = ((e.clientX - r.left) / r.width) * audio.duration
  }

  function buildShuffleOrder() {
    shuffleOrder = [...Array(filteredSongs.length).keys()].sort(() => Math.random() - 0.5)
  }

  // ── Audio events ──────────────────────────────────────
  audio.addEventListener('ended', () => { if (!isRepeat) playNext() })

  audio.addEventListener('timeupdate', () => {
    if (!audio.duration) return
    document.getElementById('progress-fill').style.width = (audio.currentTime / audio.duration * 100) + '%'
    document.getElementById('time-current').textContent = fmt(audio.currentTime)
    document.getElementById('time-total').textContent = fmt(audio.duration)
  })

  function fmt(s) {
    if (isNaN(s)) return '0:00'
    return `${Math.floor(s / 60)}:${Math.floor(s % 60).toString().padStart(2, '0')}`
  }

  // ── Visualizer ────────────────────────────────────────
  const vizEl = document.getElementById('visualizer')
  for (let i = 0; i < 24; i++) {
    const b = document.createElement('div')
    b.className = 'viz-bar'; b.style.height = '4px'
    vizEl.appendChild(b)
  }
  const bars = vizEl.querySelectorAll('.viz-bar')
  let vizInterval = null

  function startVisualizer() {
    vizEl.classList.add('active')
    if (vizInterval) return
    vizInterval = setInterval(() => bars.forEach(b => { b.style.height = (4 + Math.random() * 44) + 'px' }), 120)
  }

  function stopVisualizer() {
    vizEl.classList.remove('active')
    clearInterval(vizInterval); vizInterval = null
    bars.forEach(b => b.style.height = '4px')
  }

  // ── Media Session ─────────────────────────────────────
  function updateMediaSession(song) {
    if (!('mediaSession' in navigator)) return
    navigator.mediaSession.metadata = new MediaMetadata({
      title: cleanName(song.displayName || song.name),
      artist: song.playlist || 'JOYBOX',
      album: 'My Library'
    })
    navigator.mediaSession.setActionHandler('play', () => { audio.play(); isPlaying = true })
    navigator.mediaSession.setActionHandler('pause', () => { audio.pause(); isPlaying = false })
    navigator.mediaSession.setActionHandler('nexttrack', playNext)
    navigator.mediaSession.setActionHandler('previoustrack', playPrev)
  }

  // ── Nav ───────────────────────────────────────────────
  function switchTab(tab) {
    document.getElementById('nav-library').classList.toggle('active', tab === 'library')
    document.getElementById('nav-playlists').classList.toggle('active', tab === 'playlists')
    if (tab === 'playlists') document.getElementById('playlist-bar').scrollIntoView({ behavior: 'smooth' })
  }

  // ── Toast ─────────────────────────────────────────────
  let toastTimer = null
  function showToast(msg, isError = false) {
    const t = document.getElementById('toast')
    t.textContent = msg
    t.classList.toggle('error', isError)
    t.classList.add('show')
    clearTimeout(toastTimer)
    toastTimer = setTimeout(() => t.classList.remove('show'), 2500)
  }
</script>

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {})
  }
</script>
</body>
</html>
