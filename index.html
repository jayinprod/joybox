<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JOYBOX</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="app.css" />
</head>
<body>

<!-- LOADING -->
<div id="loading">
  <div class="spinner"></div>
  <div class="loading-text">Loading library...</div>
</div>

<!-- SETUP -->
<div id="setup-screen">
  <h1>JOYBOX</h1>
  <p>Enter your password to access your music library.</p>
  <div class="setup-card">
    <label>Password</label>
    <input type="password" id="app-password-input" placeholder="••••••••"
           onkeydown="if(event.key==='Enter') saveConfig()" />
    <button class="btn-primary" onclick="saveConfig()">Unlock</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <header>
    <h1>JOYBOX</h1>
    <button class="icon-btn" onclick="resetConfig()" title="Disconnect">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/></svg>
    </button>
  </header>

  <!-- PLAYLIST TABS -->
  <div id="playlist-bar"></div>

  <!-- NOW PLAYING -->
  <div id="now-playing">
    <div class="track-art">
      <svg width="80" height="80" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
      <div id="playlist-badge"></div>
      <div class="visualizer" id="visualizer"></div>
    </div>
    <div class="track-info">
      <div id="track-name">Select a track</div>
      <div id="track-sub">— / —</div>
    </div>
    <div class="progress-wrap">
      <div id="progress-bar" onclick="seek(event)" ontouchend="seekTouch(event)">
        <div id="progress-fill"></div>
      </div>
      <div class="time-row">
        <span id="time-current">0:00</span>
        <span id="time-total">0:00</span>
      </div>
    </div>
    <div class="controls">
      <button class="ctrl-btn" id="shuffle-btn" onclick="toggleShuffle()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/></svg>
      </button>
      <button class="ctrl-btn" onclick="playPrev()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>
      <button id="play-btn" onclick="togglePlay()">
        <svg id="play-icon" width="26" height="26" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button class="ctrl-btn" onclick="playNext()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M16 6h2v12h-2zm-8.5 6 8.5 6V6l-8.5 6z" transform="scale(-1,1) translate(-24,0)"/></svg>
      </button>
      <button class="ctrl-btn" id="repeat-btn" onclick="toggleRepeat()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
      </button>
    </div>
    <div class="volume-row">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
      <input type="range" id="volume" min="0" max="1" step="0.01" value="1" oninput="setVolume(this.value)" />
    </div>
  </div>

  <!-- SONG LIST -->
  <div id="song-list-section">
    <div class="section-header">
      <span class="section-title" id="list-title">All Songs</span>
      <span id="song-count">—</span>
    </div>
    <div id="song-list">
      <div class="empty-state">Loading...</div>
    </div>
  </div>
</div>

<!-- BOTTOM NAV -->
<div id="bottom-nav" style="display:none">
  <button class="nav-btn active" id="nav-library" onclick="switchTab('library')">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 5h-3v5.5c0 1.38-1.12 2.5-2.5 2.5S10 13.88 10 12.5s1.12-2.5 2.5-2.5c.57 0 1.08.19 1.5.51V5h4v2zM4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6z"/></svg>
    Library
  </button>
  <button class="nav-btn" id="nav-playlists" onclick="switchTab('playlists')">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M15 6H3v2h12V6zm0 4H3v2h12v-2zM3 16h8v-2H3v2zM17 6v8.18c-.31-.11-.65-.18-1-.18-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3V8h3V6h-5z"/></svg>
    Playlists
  </button>
</div>

<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
